name: Publish mod-dims Docker Image

on:
  push:
    branches: ['release']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/consultationly/medapp/mod-dims

permissions:
  contents: write
  packages: write

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    name: Build docker image and push it to ghcr registry
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Compute next version
        id: version
        run: |
          CURRENT=$(cat VERSION)
          IFS='.' read -r major minor patch <<< "$CURRENT"
          echo "new=${major}.${minor}.$((patch + 1))" >> $GITHUB_OUTPUT

      - name: Log in to the container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:v${{ steps.version.outputs.new }}
          no-cache: true

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "${{ steps.version.outputs.new }}" > VERSION
          git add VERSION
          git commit -m "chore: bump version to v${{ steps.version.outputs.new }} [skip ci]"
          git push origin HEAD:release

      - name: Dispatch chart update
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.CHART_DISPATCH_TOKEN }}
          repository: consultationly/medapp-chart
          event-type: image-updated
          client-payload: |
            {
              "service": "mod-dims",
              "version": "v${{ steps.version.outputs.new }}",
              "digest": "${{ steps.push.outputs.digest }}"
            }

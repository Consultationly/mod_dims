name: Publish mod-dims Docker Image

on:
  push:
    branches: ['release']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/consultationly/medapp/mod-dims

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    name: Build docker image and push it to ghcr registry
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Log in to the container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ env.IMAGE }}:latest
          no-cache: true

      - name: Dispatch chart update
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.CHART_DISPATCH_TOKEN }}
          repository: consultationly/medapp-chart
          event-type: image-updated
          client-payload: |
            {
              "service": "mod-dims",
              "version": "build-${{ github.run_number }}",
              "digest": "${{ steps.push.outputs.digest }}"
            }
